name: ci

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate tracked JSON
        run: git ls-files -z '*.json' | xargs -0 -n1 python -m json.tool > /dev/null
      - name: Compile Python (syntax check)
        run: git ls-files -z '*.py' | xargs -0 python -m py_compile
