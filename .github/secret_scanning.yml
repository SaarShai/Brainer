# Exclude paths whose "secrets" are deliberately-fake fixtures used to test
# Brainer's secret-redaction scrubbers. None are real credentials — they are
# malformed placeholder token SHAPES the tests assert get stripped before egress.
paths-ignore:
  - "skills/_shared/audit_redact.py"
  - "skills/_shared/test_model_roster.py"
  - "skills/_shared/test_activation_trace.py"
  - "skills/_shared/test_orchestration_trace.py"
  - "skills/brainer-audit/tools/test_redaction.py"
  - "skills/security-oversight/tools/test_security_scan.py"
