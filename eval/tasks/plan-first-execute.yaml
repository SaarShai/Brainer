id: plan-first-execute
skill: plan-first-execute
description: Measure plan-structure quality on multi-step tasks.
prompts:
  - "Refactor a Flask app from a single file into a blueprints layout. Plan the work."
  - "Add OAuth login (Google) to an existing Express app. Plan the work."
  - "Migrate a 10-table SQLite database to PostgreSQL with zero downtime. Plan it."
  - "Build a small CLI that batch-resizes images to 3 target widths. Plan it."
  - "Add semantic search over markdown notes with a small local embedding model. Plan it."
rubric: |
  Rate 0-5 on whether the response identifies discoverable facts first, lists unknowns,
  proposes phases with verification gates, and stays scoped.
  5 = explicit phases + verification gates + scoped + no premature implementation
  4 = most elements present
  3 = some structure missing
  2 = jumps to code without plan
  1 = mostly wrong
  0 = blank
  Reply: digit, then one-line reason.
