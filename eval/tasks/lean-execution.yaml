id: lean-execution
skill: lean-execution
description: Measure plan-shortening when the lean-execution skill is loaded.
prompts:
  - "I need to add a `--verbose` flag to a Python CLI script. Outline the steps you would take."
  - "Plan how to rename a class `OldHandler` to `NewHandler` across a small Python package."
  - "Outline how you'd add a single unit test for an existing pure function."
  - "I want to add one new column to a database table used in a small app. Plan it."
  - "List the steps to bump a Python dependency from 1.x to 2.x in a small project."
rubric: |
  Rate 0-5 on whether the plan is correct, minimal, and free of ceremony.
  5 = covers the essentials, no fluff, smallest reversible action first
  4 = correct but slightly long
  3 = correct, includes ceremony or speculative steps
  2 = mixed quality / too long
  1 = wrong or padded with irrelevant steps
  0 = no plan / refusal
  Reply: digit, then one-line reason.
