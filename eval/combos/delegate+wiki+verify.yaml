id: delegate+wiki+verify
skills: [delegate, wiki-memory, verify-before-completion]
description: |
  Research-style combo. Delegate routes subtasks to cheap workers, wiki-memory
  retrieves prior knowledge, verify-before-completion gates the final answer.
  Expect: explicit retrieval-before-reasoning, named subagent dispatches, and
  fresh verification commands at the end.
prompts:
  - "Plan a small research project comparing three approaches to semantic search over markdown notes. Use prior wiki notes if any exist."
  - "I want to refactor the data pipeline in three independent pieces. Decompose it and assign each piece to the cheapest capable worker."
  - "We claimed yesterday that ComCom saves 44.9% tokens. Verify that claim by pointing to the source measurement."
  - "Decompose 'add OAuth + write tests + update docs' into delegatable subtasks with model picks per piece."
  - "Confirm: is `lean-execution` still a separate skill from `plan-first-execute` in this repo? Verify by reading both."
rubric: |
  Rate 0-5 on whether the response (a) retrieves wiki/repo facts BEFORE reasoning,
  (b) names per-subtask model picks where decomposition is involved, and
  (c) ends with a fresh verification command + expected output.
  5 = all three explicit
  4 = two of three
  3 = one of three
  2 = none, but answer is correct
  1 = incorrect
  0 = blank
  Reply: digit, then one-line reason.
